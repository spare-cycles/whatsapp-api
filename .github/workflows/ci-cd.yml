name: CI/CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Lint
        run: poetry run ruff check .

      - name: Format check
        run: poetry run ruff format --check .

      - name: Type check
        run: poetry run pyright

      - name: Tests
        run: poetry run pytest

  build-api:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/whatsapp-api:latest
            ghcr.io/${{ github.repository_owner }}/whatsapp-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-mcp:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: mcp
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/whatsapp-mcp:latest
            ghcr.io/${{ github.repository_owner }}/whatsapp-mcp:${{ github.sha }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

  build-sync:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: sync
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wacli-sync:latest
            ghcr.io/${{ github.repository_owner }}/wacli-sync:${{ github.sha }}
          cache-from: type=gha,scope=sync
          cache-to: type=gha,mode=max,scope=sync
