services:
  redis:
    image: redis:7-alpine
    container_name: whatsapp-api-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - wacli-net

  whatsapp-api:
    image: ghcr.io/spare-cycles/whatsapp-api:latest
    pull_policy: always
    container_name: whatsapp-api
    restart: unless-stopped
    environment:
      WACLI_DEVICE_LABEL: ${WACLI_DEVICE_LABEL}
      WACLI_DEVICE_PLATFORM: ${WACLI_DEVICE_PLATFORM}
      WACLI_API_KEY: ${WACLI_API_KEY}
    volumes:
      - wacli-data:/root/.wacli:ro
      - uploads:/uploads
    networks:
      - wacli-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9471/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  wacli-sync:
    image: ghcr.io/spare-cycles/wacli-sync:latest
    pull_policy: always
    container_name: whatsapp-api-sync
    restart: unless-stopped
    environment:
      WACLI_DEVICE_LABEL: ${WACLI_DEVICE_LABEL}
      WACLI_DEVICE_PLATFORM: ${WACLI_DEVICE_PLATFORM}
    volumes:
      - wacli-data:/root/.wacli
      - uploads:/uploads
    networks:
      - wacli-net
    command: ["sh", "-c", "python /app/sync_worker.py & exec wacli sync --follow --refresh-groups"]

volumes:
  wacli-data:
  ts-state:
  uploads:
  redis-data:

networks:
  wacli-net:
    external: true
